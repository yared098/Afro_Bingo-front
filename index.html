<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎯</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <title>Viva Bingo | Ocean Tables</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
      body { 
        margin: 0; 
        background-color: #020617; 
        font-family: 'Inter', sans-serif; 
        overflow: hidden; 
        height: 100vh;
        user-select: none;
      }

      #loading-screen { 
        position: fixed; 
        inset: 0; 
        display: flex; 
        flex-direction: column; 
        align-items: center; 
        justify-content: center; 
        background: radial-gradient(circle at center, #0f172a 0%, #020617 100%); 
        z-index: 9999; 
        transition: opacity 0.8s cubic-bezier(0.4, 0, 0.2, 1); 
      }

      /* Animated Bubbles */
      .bubble {
        position: absolute;
        bottom: -50px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.2), rgba(255, 255, 255, 0.05));
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 50%;
        pointer-events: none;
        animation: rise linear forwards;
      }

      /* Visual Ring around Fish */
      .loader-ring {
        position: absolute;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: #f97316;
        border-bottom-color: #f97316;
        animation: spin 2s linear infinite;
        opacity: 0.3;
      }

      .fish-container { 
        font-size: 64px; 
        animation: swim 3s ease-in-out infinite; 
        filter: drop-shadow(0 0 25px rgba(249, 115, 22, 0.6)); 
        z-index: 10;
        position: relative;
      }

      .loading-text { 
        margin-top: 40px; 
        color: #f97316; 
        font-weight: 900; 
        text-transform: uppercase; 
        letter-spacing: 0.5em; 
        font-size: 12px; 
        animation: pulse 2s ease-in-out infinite; 
        z-index: 10;
        text-shadow: 0 0 15px rgba(249, 115, 22, 0.5);
      }

      @keyframes spin { 100% { transform: rotate(360deg); } }

      @keyframes swim { 
        0%, 100% { transform: translateX(-20px) translateY(0) rotate(-5deg); } 
        50% { transform: translateX(20px) translateY(-15px) rotate(15deg); } 
      }

      @keyframes pulse { 
        0%, 100% { opacity: 1; transform: scale(1); letter-spacing: 0.5em; } 
        50% { opacity: 0.4; transform: scale(0.98); letter-spacing: 0.6em; } 
      }

      @keyframes rise {
        to { transform: translateY(-120vh); opacity: 0; }
      }

      /* Hide splash when React starts */
      #root:not(:empty) + #loading-screen { 
        opacity: 0; 
        pointer-events: none; 
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <div id="loading-screen">
      <div class="loader-ring"></div>
      
      <div class="fish-container">🎯</div>
      
      <div class="loading-text">Viva Bingo</div>
    </div>

    <script>
      // 1. Initialize Telegram
      if (window.Telegram && window.Telegram.WebApp) {
        window.Telegram.WebApp.ready();
        window.Telegram.WebApp.expand();
        window.Telegram.WebApp.headerColor = '#020617';
      }

      // 2. Dynamic Bubble Generator for "Good GUI"
      const createBubble = () => {
        const screen = document.getElementById('loading-screen');
        if (!screen || screen.style.opacity === '0') return;

        const bubble = document.createElement('div');
        const size = Math.random() * 30 + 10 + 'px';
        const duration = Math.random() * 3 + 4 + 's';
        
        bubble.className = 'bubble';
        bubble.style.width = size;
        bubble.style.height = size;
        bubble.style.left = Math.random() * 100 + 'vw';
        bubble.style.animationDuration = duration;
        
        screen.appendChild(bubble);

        // Remove from DOM after animation finishes
        setTimeout(() => bubble.remove(), 7000);
      };

      // Create a bubble every 400ms
      const bubbleInterval = setInterval(createBubble, 400);

      // Stop creating bubbles if loader is hidden
      const observer = new MutationObserver(() => {
        const root = document.getElementById('root');
        if (root.innerHTML.length > 0) {
            clearInterval(bubbleInterval);
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
    </script>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
